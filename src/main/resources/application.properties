spring.application.name=dicestore

# === CORS ===
# Local dev fallback (Vite default: http://localhost:5173)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# === OPENAPI ===
openapi.version=${API_VERSION:1.0.0}
openapi.name=${API_NAME:dicestore}
openapi.description=${API_DESCRIPTION:Backend API for managing Products, Customers, Orders, and Carts}

# === ACTUATOR ===
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator/health
management.endpoints.web.exposure.include=*

# === LOGGING ===
logging.level.org.springframework.security=DEBUG
logging.level.com.victoruk.eazystore=DEBUG

# === CLOUDINARY ===
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dummy}
cloudinary.secure=true

# === MAIL ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:tochukwu.victoruk@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.connectiontimeout=5000
spring.mail.properties.mail.timeout=5000
spring.mail.properties.mail.writetimeout=5000
spring.mail.properties.mail.debug=true

# Base URL of the frontend application. ==
# Used for generating links in emails (e.g., password reset). ==
# Change this to your frontend URL when deploying or testing. ==
app.frontend.url=http://localhost:5173
