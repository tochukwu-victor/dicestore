spring.application.name=dicestore

# === CORS ===
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# === OPENAPI ===
openapi.version=${API_VERSION:1.0.0}
openapi.name=${API_NAME:dicestore}
openapi.description=${API_DESCRIPTION:Backend API for managing Products, Customers, Orders, and Carts}

# === ACTUATOR ===
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator/health
management.endpoints.web.exposure.include=*

# === JPA ===
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

# === LOGGING ===
logging.level.org.springframework.security=DEBUG
logging.level.com.victoruk.dicestore=DEBUG

# === CLOUDINARY ===
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dummy}
cloudinary.secure=true

# === MAIL ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:tochukwu.victoruk@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.connectiontimeout=5000
spring.mail.properties.mail.timeout=5000
spring.mail.properties.mail.writetimeout=5000
spring.mail.properties.mail.debug=true

# === PASSWORD RESET ===
app.frontend.url=http://localhost:3000
app.frontend.reset-password-path=/reset-password
app.reset-token.ttl-minutes=30
app.reset-token.email-template=reset-password-email

# === PAYSTACK ===
app.paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_95891b0fd83dc83b70311bcfbf8afbbb8fc2c151}
app.paystack.initialize-url=https://api.paystack.co/transaction/initialize
app.paystack.verify-url=https://api.paystack.co/transaction/verify
app.paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET}
app.paystack.order-confirmation-email-template=order-confirmation-email