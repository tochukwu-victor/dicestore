spring.application.name=dicestore

 #=== MYSQL DATABASE CONFIGURATION ===
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:dicestores}
spring.datasource.username=${DATABASE_USERNAME:root}
#spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.password=${DATABASE_PASSWORD:victoruk11}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_URL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

# === CUSTOM OPENAPI CONFIGURATION ===
openapi.version=${API_VERSION:1.0.0}
openapi.name=${API_NAME:dicestore}
openapi.description=${API_DESCRIPTION:Backend API for managing Products, Customers, Orders, and Carts in Dicestore.}


# ========== ACTUATOR CONFIGURATION ==========
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/dicestore/actuator
management.endpoints.web.exposure.include=*

# ========== SPRING SECURITY  LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.com.victoruk.eazystore=DEBUG

# ========== STRIPE CONFIGURATION (via env vars) ==========
stripe.apiKey=${STRIPE_SECRET_KEY:dummy}

# ========== CLOUDINARY CONFIGURATION (via env vars) ==========
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dummy}
cloudinary.secure=true

# CORS allowed origins (comma-separated list)
app.cors.allowed-origins=http://localhost:5173,https://dicestore.com

