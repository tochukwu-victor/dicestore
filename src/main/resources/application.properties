# === CUSTOM OPENAPI CONFIGURATION ===
openapi.version=${API_VERSION:1.0.0}
openapi.name=${API_NAME:dicestore}
openapi.description=${API_DESCRIPTION:Backend API for managing Products, Customers, Orders, and Carts in Dicestore.}


# ========== ACTUATOR CONFIGURATION ==========
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/dicestore/actuator
management.endpoints.web.exposure.include=*

# ========== SPRING SECURITY  LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.com.victoruk.eazystore=DEBUG

# ========== H2 DATABASE CONFIGURATION ==========
spring.datasource.url=jdbc:h2:mem:dicestore
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== JPA CONFIGURATION ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ========== H2 CONSOLE ==========
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========== SQL INIT (for schema.sql and data.sql) ==========
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ========== STRIPE CONFIGURATION (via env vars) ==========
stripe.apiKey=${STRIPE_SECRET_KEY:dummy}

# ========== CLOUDINARY CONFIGURATION (via env vars) ==========
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dummy}
cloudinary.secure=true
