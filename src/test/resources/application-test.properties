# === H2 IN-MEMORY DATABASE FOR CI PIPELINE ===
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# === JPA ===
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# === FLYWAY ===
spring.flyway.enabled=false

# === MAIL (disable for tests) ===
spring.mail.host=localhost
spring.mail.port=3025

# === CLOUDINARY (dummy for tests) ===
cloudinary.cloud_name=demo
cloudinary.api_key=dummy
cloudinary.api_secret=dummy

# === PAYSTACK (dummy for tests) ===
app.paystack.secret-key=sk_test_dummy
app.paystack.webhook-secret=dummy_webhook_secret